<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Real time JS converter">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2064%2064'%3E%0A%3Ccircle%20cx%3D'32'%20cy%3D'32'%20r%3D'32'%20fill%3D'%23ffdd00'%2F%3E%0A%3Ctext%20x%3D'32'%20y%3D'46'%20font-size%3D'38'%20font-weight%3D'700'%20text-anchor%3D'middle'%20fill%3D'%23ffffff'%20font-family%3D'Arial'%20letter-spacing%3D'-1'%3EaW%3C%2Ftext%3E%0A%3C%2Fsvg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time JS Converter</title>
  <style> 
    body {
      font-family: "din-round", "proxima-nova", sans-serif, Arial;
      background: #131f24; 
      color: #eeeeee;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      color: #58cc02;
      font-size: 1.8rem;
      margin: 20px 0;
      text-transform: lowercase;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .main-wrapper {
      display: flex;
      flex: 1;
      width: 100%;
      border-top: 2px solid #1b2c33;
    }

    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-right: 1px solid #1b2c33;
    }

    .output-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      background: rgba(0, 0, 0, 0.1);
      position: relative; /* Needed for absolute positioning of copy button */
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .section-label {
      font-weight: 700;
      color: #52656d;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 2px;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      background: transparent; 
      color: #eeeeee;
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      outline: none;
      font-family: inherit;
    }

    #output {
      color: #1cb0f6; 
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
    }

    /* Copy Button Styling */
    .copy-btn {
      background: #3b4c54;
      color: #eeeeee;
      border: none;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 3px 0 #1b2c33;
    }

    .copy-btn:hover {
      background: #4b5d67;
      filter: brightness(1.1);
    }

    .copy-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #1b2c33;
    }

    .copy-btn.success {
      background: #58cc02;
      box-shadow: 0 3px 0 #46a302;
    }

    ::placeholder {
      color: #3b4c54;
    }

    .editor-pane:focus-within {
      background: rgba(255, 255, 255, 0.01);
    }
  </style>
</head>
<body>

  

  <div class="main-wrapper">
    <div class="editor-pane">
      <div class="section-label">Input (Plain Text)</div>
      <textarea id="input" oninput="convertData()" placeholder="Start typing here...">
Door 1: Basics

Level 1: Spelling
Question: Choose the correct spelling:
Answer: friend
Choices: friend, freind
Hint: Which one looks right?</textarea>
    </div>

    <div class="output-pane">
      <div class="header-row">
        <div class="section-label">Output (JSON Format)</div>
        <button class="copy-btn" onclick="copyOutput()" title="Copy to clipboard">
          <i id="copyIcon" class="fa-regular fa-copy"></i>
        </button>
      </div>
      <textarea id="output" readonly placeholder="JSON result will appear here..."></textarea>
    </div>
  </div>

<script>
window.onload = convertData;

function copyOutput() {
  const outputText = document.getElementById('output');
  const btn = document.querySelector('.copy-btn');
  const icon = document.getElementById('copyIcon');

  if (!outputText.value) return;

  navigator.clipboard.writeText(outputText.value).then(() => {
    // Visual Feedback
    btn.classList.add('success');
    icon.className = 'fa-solid fa-check';
    
    setTimeout(() => {
      btn.classList.remove('success');
      icon.className = 'fa-regular fa-copy';
    }, 2000);
  });
}

function convertData() {
  const input = document.getElementById('input').value;
  const output = document.getElementById('output');

  if (!input.trim()) {
    output.value = "";
    return;
  }

  try {
    const lines = input.split('\n').map(l => l.trim()).filter(Boolean);
    const result = { doors: [] };
    let currentDoor = null;
    let currentLevel = null;

    lines.forEach(line => {
      if (line.startsWith('Door')) {
        currentDoor = {
          door: result.doors.length + 1,
          name: line,
          levels: []
        };
        result.doors.push(currentDoor);
      } else if (line.startsWith('Level')) {
        currentLevel = {
          level: (currentDoor?.levels.length || 0) + 1,
          title: line.split(':')[1]?.trim() || "Untitled",
          questions: []
        };
        if(currentDoor) currentDoor.levels.push(currentLevel);
      } else if (line.startsWith('Question:')) {
        if (currentLevel) {
          currentLevel.questions.push({
            id: currentLevel.questions.length + 1,
            question: line.replace('Question:', '').trim()
          });
        }
      } else if (line.startsWith('Answer:')) {
        if (currentLevel && currentLevel.questions.length > 0) {
          currentLevel.questions.at(-1).answer = line.replace('Answer:', '').trim();
        }
      } else if (line.startsWith('Choices:')) {
        if (currentLevel && currentLevel.questions.length > 0) {
          currentLevel.questions.at(-1).choices =
            line.replace('Choices:', '').split(',').map(c => c.trim());
        }
      } else if (line.startsWith('Hint:')) {
        if (currentLevel && currentLevel.questions.length > 0) {
          currentLevel.questions.at(-1).hint = line.replace('Hint:', '').trim();
        }
      }
    });

    output.value = JSON.stringify(result, null, 2);
  } catch (e) {
    output.value = 'Typing... ⌛';
  }
}
</script>

</body>
</html>
